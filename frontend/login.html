<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ERP Venner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #3DA5D9;
            --accent: #ff3e81;
            --bg: #0a0e14;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Animated Background Mesh */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(61, 165, 217, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 62, 129, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 1) 0%, rgba(10, 14, 20, 1) 100%);
        }

        .bg-mesh::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3FfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3F/filter%3E%3Frect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3F/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo-v-new {
            width: 70px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(61, 165, 217, 0.4));
        }

        .logo-text {
            font-family: 'Michroma', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 4px;
            background: linear-gradient(to bottom, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 400;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 18px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
            transition: color 0.3s;
        }

        input {
            width: 100%;
            padding: 16px 16px 16px 52px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 400;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(61, 165, 217, 0.05);
            box-shadow: 0 0 0 4px rgba(61, 165, 217, 0.1);
        }

        input:focus + i {
            color: var(--primary);
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary) 0%, #2a8cc2 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px -5px rgba(61, 165, 217, 0.4);
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -5px rgba(61, 165, 217, 0.5);
            filter: brightness(1.1);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-top: 24px;
            display: none;
            text-align: center;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .loading-ring {
            display: inline-block;
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-text {
            position: absolute;
            bottom: 40px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* Ambient light effects */
        .light-orb {
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.15;
            pointer-events: none;
        }

        .orb-1 { top: -100px; right: -100px; background: var(--primary); }
        .orb-2 { bottom: -100px; left: -100px; background: var(--accent); }

    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="light-orb orb-1"></div>
    <div class="light-orb orb-2"></div>

    <div class="login-card">
        <div class="logo-section">
            <svg class="logo-v-new" viewBox="0 0 100 100" style="width: 80px; height: 80px;">
                <defs>
                    <linearGradient id="logo-grad-login" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#3DA5D9;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path d="M20 20 L45 80 L55 80 L80 20 L65 20 L50 60 L35 20 Z" fill="url(#logo-grad-login)" />
                <path d="M48 55 L50 85 L52 55 Z" fill="#3DA5D9" opacity="0.8" />
            </svg>
            <div class="logo-text">VENNER</div>
            <div class="subtitle">Industrial Management Hub</div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="ph-fill ph-user"></i>
                    <input type="text" id="username" required placeholder="Usuário do Sistema">
                </div>
            </div>
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="ph-fill ph-lock-key"></i>
                    <input type="password" id="password" required placeholder="Sua senha secreta">
                </div>
            </div>
            <button type="submit" id="loginBtn" class="btn-login">
                <span>Acessar Painel</span>
                <i class="ph ph-arrow-right"></i>
            </button>
            <div id="errorMessage" class="error-msg"></div>
        </form>
    </div>

    <div class="footer-text">v2.0 PRO · VENNER METALÚRGICA</div>

    <script>
        // ponytail: normalização inline e simplificada
        const urlParams = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        
        let targetPath = (urlParams.get('target') || sessionStorage.getItem('post_login_redirect') || '/index.html').trim();
        if (!targetPath.startsWith('/') || targetPath.startsWith('//') || targetPath.includes('://')) targetPath = '/index.html';
        
        const desktopMode = urlParams.get('desktop') || sessionStorage.getItem('venner_desktop_mode') || '';
        const agentUrl = (urlParams.get('agent') || sessionStorage.getItem('venner_agent_url') || '').trim();
        const hubToken = (hashParams.get('hub_token') || '').trim();
        const hubUsername = (hashParams.get('hub_user') || '').trim();
        
        const loginQuery = new URLSearchParams({ target: targetPath });
        if (desktopMode === '1') loginQuery.set('desktop', '1');
        if (agentUrl) loginQuery.set('agent', agentUrl);
        const loginPath = `/login.html?${loginQuery.toString()}`;

        sessionStorage.setItem('post_login_redirect', targetPath);
        sessionStorage.setItem('app_login_path', loginPath);
        if (desktopMode === '1') sessionStorage.setItem('venner_desktop_mode', '1');
        if (agentUrl) sessionStorage.setItem('venner_agent_url', agentUrl);
        if (hubUsername) sessionStorage.setItem('venner_hub_username', hubUsername);
        
        if (hubToken || hubUsername) history.replaceState(null, '', loginPath);

        if (urlParams.get('logout') === 'hub') {
            document.querySelector('.login-card').innerHTML = `
                <div class="logo-section">
                    <svg class="logo-v-new" viewBox="0 0 100 100" style="width: 80px; height: 80px;">
                        <path d="M20 20 L45 80 L55 80 L80 20 L65 20 L50 60 L35 20 Z" fill="url(#logo-grad-login)" />
                        <path d="M48 55 L50 85 L52 55 Z" fill="#3DA5D9" opacity="0.8" />
                    </svg>
                    <div class="logo-text">VENNER</div>
                    <div class="subtitle">Sessão Encerrada</div>
                </div>
                <div style="text-align: center; padding: 20px;">
                    <p style="margin-bottom: 30px; color: rgba(255,255,255,0.7); line-height: 1.6;">
                        Você saiu do módulo com sucesso. <br>
                        <strong>Pode fechar esta janela</strong> e voltar ao Venner Hub para selecionar outro módulo.
                    </p>
                    <button onclick="window.close()" class="btn-login" style="background: rgba(255,255,255,0.1); box-shadow: none;">
                        <i class="ph ph-x-circle"></i> Fechar Janela
                    </button>
                </div>
            `;
        }

        if (hubToken) {
            sessionStorage.setItem('token', hubToken);
            window.location.replace(targetPath);
        }

        const getLoginErrorMessage = async (res) => (await res.json().catch(()=>({}))).detail || (res.status === 401 ? 'Usuário ou senha incorretos.' : 'Falha ao autenticar no servidor.');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginBtn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');
            
            loginBtn.disabled = true;
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<div class="loading-ring"></div><span>Autenticando...</span>';
            errorDiv.style.display = 'none';

            try {
                const formData = new URLSearchParams();
                formData.append('username', document.getElementById('username').value);
                formData.append('password', document.getElementById('password').value);

                // ponytail: fetch simples, yagni de AbortController
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    body: formData,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });

                if (response.ok) {
                    sessionStorage.setItem('token', (await response.json()).access_token);
                    loginBtn.innerHTML = '<i class="ph-fill ph-check-circle" style="font-size: 24px;"></i><span>Bem-vindo!</span>';
                    loginBtn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
                    loginBtn.style.boxShadow = '0 10px 20px -5px rgba(16, 185, 129, 0.4)';
                    setTimeout(() => window.location.href = targetPath, 800);
                } else {
                    errorDiv.innerText = await getLoginErrorMessage(response);
                    errorDiv.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = originalText;
                }
            } catch (err) {
                errorDiv.innerText = 'Não foi possível conectar ao servidor.';
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalText;
            }
        });

        window.onload = () => {
            const lastHubUser = sessionStorage.getItem('venner_hub_username');
            if (lastHubUser) document.getElementById('username').value = lastHubUser;
            document.getElementById('username').focus();
            if (sessionStorage.getItem('token')) window.location.href = targetPath;
        };
    </script>
</body>
</html>
