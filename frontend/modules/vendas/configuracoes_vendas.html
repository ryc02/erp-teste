<div class="view-section">
    <div class="card">
        <h3><i class="ph ph-gear-six"></i> Configurações de Vendas</h3>
        <p class="text-secondary" style="margin-bottom: 20px;">Parâmetros globais para o módulo de vendas.</p>
        
        <form id="form-config-vendas" class="data-form" style="max-width: 600px;">
            <div class="form-grid">
                <div class="form-group">
                    <label>Tipo de Desconto Padrão</label>
                    <select id="config-desconto-tipo">
                        <option value="VALOR">Valor (R$)</option>
                        <option value="PERCENTUAL">Percentual (%)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Dias de Vencimento Padrão</label>
                    <input type="number" id="config-dias-vencimento" min="0" value="30">
                </div>
            </div>

            <div style="margin-top: 15px;">
                <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                    <input type="checkbox" id="config-taxa-cartao">
                    <span>Considerar taxa de cartão no preço do produto</span>
                </label>
                <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                    <input type="checkbox" id="config-imprimir-vendedor">
                    <span>Imprimir nome do vendedor no pedido</span>
                </label>
                <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                    <input type="checkbox" id="config-imprimir-obs">
                    <span>Imprimir observações no pedido</span>
                </label>
            </div>

            <div class="form-actions" style="margin-top: 30px;">
                <button type="button" class="btn btn-primary" onclick="Modulo_configuracoes_vendas.salvarConfiguracoes()">
                    <i class="ph ph-floppy-disk"></i> Salvar Configurações
                </button>
            </div>
        </form>
    </div>
</div>
