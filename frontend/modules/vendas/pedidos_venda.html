<div class="view-section">
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3><i class="ph ph-receipt"></i> Pedidos de Venda</h3>
            <button class="btn btn-primary" onclick="Modulo_pedidos_venda.novoPedido()">
                <i class="ph ph-plus"></i> Novo Pedido
            </button>
        </div>
        
        <div class="filters" style="display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px;" id="pedidos-filters">
            <button class="btn btn-sm btn-primary filter-btn active" data-status="" onclick="Modulo_pedidos_venda.setFiltro('')">Todos</button>
            <button class="btn btn-sm btn-outline filter-btn" data-status="EM_ABERTO" onclick="Modulo_pedidos_venda.setFiltro('EM_ABERTO')">Em Aberto</button>
            <button class="btn btn-sm btn-outline filter-btn" data-status="APROVADO" onclick="Modulo_pedidos_venda.setFiltro('APROVADO')">Aprovado</button>
            <button class="btn btn-sm btn-outline filter-btn" data-status="PREPARANDO_ENVIO" onclick="Modulo_pedidos_venda.setFiltro('PREPARANDO_ENVIO')">Preparando Envio</button>
            <button class="btn btn-sm btn-outline filter-btn" data-status="FATURADO" onclick="Modulo_pedidos_venda.setFiltro('FATURADO')">Faturado</button>
            <button class="btn btn-sm btn-outline filter-btn" data-status="PRONTO_ENVIO" onclick="Modulo_pedidos_venda.setFiltro('PRONTO_ENVIO')">Pronto p/ Envio</button>
            <button class="btn btn-sm btn-outline filter-btn" data-status="ENVIADO" onclick="Modulo_pedidos_venda.setFiltro('ENVIADO')">Enviado</button>
            <button class="btn btn-sm btn-outline filter-btn" data-status="ENTREGUE" onclick="Modulo_pedidos_venda.setFiltro('ENTREGUE')">Entregue</button>
        </div>

        <div class="table-responsive">
            <table class="olist-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Data</th>
                        <th>Cliente</th>
                        <th>Status</th>
                        <th>Total</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="pedidos-table-body">
                    <tr><td colspan="6" style="text-align: center;">Carregando pedidos...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Detalhes / Novo Pedido -->
<div id="modal-pedido" class="modal">
    <div class="modal-content" style="max-width: 800px; width: 90%;">
        <div class="modal-header">
            <h3 id="modal-pedido-title">Pedido</h3>
            <span class="close-btn" onclick="Modulo_pedidos_venda.fecharModal()">&times;</span>
        </div>
        <div class="modal-body" id="modal-pedido-body">
            <!-- Conteúdo dinâmico -->
        </div>
    </div>
</div>
