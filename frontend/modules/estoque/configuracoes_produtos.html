<script src="../../core/module-shell-redirect.js" data-module-id="estoque"></script>
<!-- VIEW: CONFIGURAÇÕES DE PRODUTOS -->
<section id="view-configuracoes-produtos" class="view-section">
    <div style="margin-bottom: 24px;">
        <h2>Configurações de Produtos</h2>
        <p style="color: var(--text-secondary); font-size: 14px;">Ajuste os parâmetros globais de cadastro e movimentação de produtos.</p>
    </div>

    <div class="card" style="max-width: 800px;">
        <form id="form-configuracoes-produtos" onsubmit="Modulo_configuracoes_produtos.save(event)">
            
            <div style="padding: 24px; border-bottom: 1px solid var(--border);">
                <h4 style="margin-bottom: 16px; color: var(--accent);">Geral</h4>
                
                <div class="grid-2">
                    <div class="input-group">
                        <label>Casas decimais na quantidade</label>
                        <input type="number" name="casas_decimais_quantidade" min="0" max="4" required>
                    </div>
                    <div class="input-group">
                        <label>Casas decimais no preço</label>
                        <input type="number" name="casas_decimais_preco" min="0" max="4" required>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label>Código (SKU) Automático</label>
                        <select name="sku_automatico">
                            <option value="false">Não (Manual)</option>
                            <option value="true">Sim (Automático)</option>
                        </select>
                        <small style="color: var(--text-secondary); display: block; margin-top: 4px;">Gera o código sequencialmente se habilitado.</small>
                    </div>
                    
                    <div class="input-group">
                        <label>Custo de Kits/Fabricados</label>
                        <select name="base_calculo_custo">
                            <option value="ultimo_custo">Último Custo de Compra</option>
                            <option value="custo_medio">Custo Médio</option>
                        </select>
                    </div>
                </div>
                
                <div class="input-group" style="margin-top: 16px;">
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" name="somar_peso_pedidos" style="width: 16px; height: 16px;">
                        Somar peso dos produtos nas notas fiscais, propostas comerciais e pedidos de venda
                    </label>
                </div>

                <div class="input-group" style="margin-top: 16px;">
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" name="cadastro_automatico_compras" style="width: 16px; height: 16px;">
                        Cadastrar automaticamente produtos a partir de compras e vendas (se não existirem)
                    </label>
                </div>
            </div>

            <div style="padding: 24px; border-bottom: 1px solid var(--border);">
                <h4 style="margin-bottom: 16px; color: var(--accent);">Padrões para Novos Cadastros</h4>
                <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 16px;">
                    Defina os valores que virão preenchidos por padrão na tela de Novo Produto.
                </p>

                <div class="grid-2">
                    <div class="input-group">
                        <label>Unidade de Medida Padrão</label>
                        <input type="text" name="unidade_medida_padrao" placeholder="Ex: UN">
                    </div>
                    
                    <div class="input-group">
                        <label>Origem (ICMS) Padrão</label>
                        <select name="origem_padrao">
                            <option value="0">0 - Nacional</option>
                            <option value="1">1 - Estrangeira (Importação Direta)</option>
                            <option value="2">2 - Estrangeira (Mercado Interno)</option>
                        </select>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label>NCM Padrão</label>
                        <input type="text" name="ncm_padrao" placeholder="Ex: 0000.00.00">
                    </div>

                    <div class="input-group">
                        <label style="display: flex; align-items: center; gap: 8px; margin-top: 28px;">
                            <input type="checkbox" name="exibir_estoque_lista_precos" style="width: 16px; height: 16px;">
                            Exibir estoque do produto na lista de preços
                        </label>
                    </div>
                </div>
            </div>

            <div style="padding: 24px; text-align: right;">
                <button type="submit" class="btn btn-primary" style="min-width: 150px;">
                    <i class="ph ph-floppy-disk"></i> Salvar Configurações
                </button>
            </div>
        </form>
    </div>
</section>
