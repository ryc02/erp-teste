<script src="../../core/module-shell-redirect.js" data-module-id="pcp"></script>
<!-- VIEW: PRODUÇÃO (PCP) -->
<section id="view-pcp" class="view-section">
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px;">
        <div>
            <div style="font-size: 12px; color: #888; margin-bottom: 8px;">
                módulo <span >gestão</span>
            </div>
            <h2 style="margin: 0; font-size: 24px; font-weight: 600; ">Produção (PCP)</h2>
        </div>
        <div class="flex-gap">
            <button class="btn btn-primary" onclick="openModal('modal-nova-op')">
                <i class="ph ph-plus"></i> Nova OP
            </button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total de OPs</div>
            <div class="stat-value" id="stat-pcp-total">0</div>
        </div>
        <div class="stat-card warning">
            <div class="stat-label">Em Produção</div>
            <div class="stat-value" id="stat-pcp-andamento">0</div>
        </div>
        <div class="stat-card success">
            <div class="stat-label">Eficiência Média</div>
            <div class="stat-value" id="stat-pcp-eficiencia">0%</div>
        </div>
    </div>

    <div class="tabs-container" style="margin-bottom: 24px;">
        <button class="olist-tab active tab-btn" style="background:transparent; border-top:none; border-left:none; border-right:none;" onclick="Modulo_pcp.switchTab('pcp-tab-lista')">Lista de OPs</button>
        <button class="olist-tab tab-btn" style="background:transparent; border-top:none; border-left:none; border-right:none;" onclick="Modulo_pcp.switchTab('pcp-tab-timeline')">Linha do Tempo (Gantt)</button>
    </div>

    <div id="pcp-tab-lista" class="tab-content active">
        <div class="card">
            <div style="padding: 20px; border-bottom: 1px solid var(--border); font-weight: 600;">
                Ordens de Produção (OP)
            </div>
            <table class="olist-table" id="table-op">
            <thead>
                <tr>
                    <th>OP #</th>
                    <th>Produto</th>
                    <th>Qtd Planejada</th>
                    <th>Qtd Produzida</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="pcp-tab-timeline" class="tab-content">
        <div class="card" style="padding: 24px; min-height: 400px;">
            <div id="pcp-gantt-container" style="overflow-x: auto;">
                <p style="color: var(--text-secondary); text-align: center; padding-top: 100px;">
                    Carregando cronograma de produção...
                </p>
            </div>
        </div>
    </div>
</section>

<!-- MODAL: NOVA OP -->
<div id="modal-nova-op" class="modal">
    <div class="modal-content card">
        <h3>Nova Ordem de Produção</h3>
        <form id="form-op" onsubmit="Modulo_pcp.saveOP(event)">
            <div class="input-group">
                <label>Produto Composto</label>
                <select id="op-produto-sel" required></select>
            </div>
            <div class="input-group">
                <label>Quantidade Planejada</label>
                <input type="number" id="op-qtd" step="any" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="action-button" onclick="closeModal('modal-nova-op')">Cancelar</button>
                <button type="submit" class="btn btn-primary">Criar OP</button>
            </div>
        </form>
    </div>
</div>
