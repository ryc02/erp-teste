<div class="view-section">
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3><i class="ph ph-package"></i> Painel de Expedição</h3>
            <div style="display: flex; gap: 10px;">
                <button class="action-button" onclick="Modulo_expedicao_painel.imprimirPicking()"><i class="ph ph-list-numbers"></i> Picking List</button>
                <button class="action-button" onclick="Modulo_expedicao_painel.imprimirEtiquetas()"><i class="ph ph-printer"></i> Etiquetas</button>
                <button class="action-button" onclick="Modulo_expedicao_painel.imprimirDCE()"><i class="ph ph-file-text"></i> DC-e</button>
                <button class="btn btn-primary" onclick="Modulo_expedicao_painel.separarPedidos()"><i class="ph ph-check-square"></i> Separar</button>
                <button class="btn btn-primary" onclick="Modulo_expedicao_painel.embalarPedidos()"><i class="ph ph-box"></i> Embalar</button>
                <button class="btn btn-primary" onclick="Modulo_expedicao_painel.modalDespachar()"><i class="ph ph-truck"></i> Despachar</button>
            </div>
        </div>

        <div class="filters" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="btn btn-sm btn-primary filter-btn active" data-status="" onclick="Modulo_expedicao_painel.setFiltro('')">Todos</button>
            <button class="btn btn-sm btn-outline filter-btn" data-status="PREPARANDO_ENVIO" onclick="Modulo_expedicao_painel.setFiltro('PREPARANDO_ENVIO')">A Separar</button>
            <button class="btn btn-sm btn-outline filter-btn" data-status="SEPARADO" onclick="Modulo_expedicao_painel.setFiltro('SEPARADO')">Separados</button>
            <button class="btn btn-sm btn-outline filter-btn" data-status="FATURADO" onclick="Modulo_expedicao_painel.setFiltro('FATURADO')">Faturados</button>
            <button class="btn btn-sm btn-outline filter-btn" data-status="PRONTO_ENVIO" onclick="Modulo_expedicao_painel.setFiltro('PRONTO_ENVIO')">Embaladas / Prontos</button>
        </div>

        <div class="table-responsive">
            <table class="olist-table">
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox" id="check-todos-pedidos" onclick="Modulo_expedicao_painel.toggleTodos()"></th>
                        <th>Pedido</th>
                        <th>Data</th>
                        <th>Cliente</th>
                        <th>Status</th>
                        <th>Qtd. Itens</th>
                    </tr>
                </thead>
                <tbody id="expedicao-table-body">
                    <tr><td colspan="6" style="text-align: center;">Carregando expedição...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Dispatch (Despachar) -->
<div id="modal-despachar" class="modal">
    <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
            <h3>Confirmar Despacho</h3>
            <span class="close-btn" onclick="Modulo_expedicao_painel.fecharModal()">&times;</span>
        </div>
        <div class="modal-body">
            <p>Os pedidos selecionados serão marcados como <strong>ENVIADO</strong>.</p>
            <div class="form-group" style="margin-top: 15px;">
                <label>Transportadora Comum (Opcional)</label>
                <input type="text" id="despacho-transportadora" placeholder="Ex: Correios SEDEX">
            </div>
            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="action-button" onclick="Modulo_expedicao_painel.fecharModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="Modulo_expedicao_painel.confirmarDespacho()">Confirmar Envio</button>
            </div>
        </div>
    </div>
</div>
