<section id="view-separacao" class="module-view">
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px;">
        <div>
            <div style="font-size: 12px; color: #888; margin-bottom: 8px;">
                módulo <span >gestão</span>
            </div>
            <h2 style="margin: 0; font-size: 24px; font-weight: 600; ">Separação de Produtos (Picking)</h2>
        </div>
        <div class="flex-gap">
            <button class="action-button" onclick="Modulo_separacao.refresh()">
                <i class="ph ph-arrows-clockwise"></i>
            </button>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs" style="margin-bottom: 20px;">
        <button class="olist-tab active tab-btn" style="background:transparent; border-top:none; border-left:none; border-right:none;" onclick="Modulo_separacao.filtrarStatus('')">Fila de Separação</button>
        <button class="olist-tab tab-btn" style="background:transparent; border-top:none; border-left:none; border-right:none;" onclick="Modulo_separacao.filtrarStatus('EM_SEPARACAO')">Em Separação</button>
        <button class="olist-tab tab-btn" style="background:transparent; border-top:none; border-left:none; border-right:none;" onclick="Modulo_separacao.filtrarStatus('SEPARADO')">Separados/Conferidos</button>
    </div>

    <div class="grid-2">
        <!-- Lista de Pedidos -->
        <div class="card" style="height: calc(100vh - 250px); overflow-y: auto;">
            <h5>Pedidos</h5>
            <div id="separacao-lista-pedidos" class="mt-3">
                <!-- Javascript content -->
            </div>
        </div>

        <!-- Detalhe da Separação do Pedido Selecionado -->
        <div class="card" style="height: calc(100vh - 250px); display: flex; flex-direction: column;">
            <div id="separacao-detalhe-empty" style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-secondary);">
                <i class="ph ph-barcode" style="font-size: 48px; margin-bottom: 10px; opacity: 0.5;"></i>
                <p>Selecione um pedido para iniciar a separação.</p>
            </div>
            
            <div id="separacao-detalhe-content" style="display: none; flex: 1; flex-direction: column;">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px;">
                    <div>
                        <h4 id="separacao-pedido-title" style="margin:0; font-size: 1.2rem;">Pedido #---</h4>
                        <span id="separacao-pedido-cliente" style="color: var(--text-secondary); font-size: 0.9rem;">Cliente</span>
                    </div>
                    <div>
                        <span class="badge" id="separacao-pedido-status">AGUARDANDO</span>
                    </div>
                </div>

                <!-- Input para Bipar -->
                <div id="separacao-bipagem-area" class="input-group" style="margin-bottom: 20px;">
                    <label>Bipar Item (SKU ou Código de Barras)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="separacao-input-bip" placeholder="Escaneie o código aqui..." style="font-size: 1.1rem; padding: 10px;" onkeyup="if(event.key === 'Enter') Modulo_separacao.biparItem()">
                        <button class="btn btn-primary" onclick="Modulo_separacao.biparItem()">OK</button>
                    </div>
                </div>

                <!-- Progresso -->
                <div style="margin-bottom: 15px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9em;">
                        <span>Progresso da Separação</span>
                        <strong id="separacao-progresso-text">0/0 Itens</strong>
                    </div>
                    <div style="width: 100%; background: var(--border-color); height: 8px; border-radius: 4px; overflow: hidden;">
                        <div id="separacao-progresso-bar" style="width: 0%; height: 100%; background: var(--success); transition: width 0.3s;"></div>
                    </div>
                </div>

                <div class="table-responsive" style="flex: 1; overflow-y: auto;">
                    <table class="olist-table">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>SKU/GTIN</th>
                                <th>Qtde Pedida</th>
                                <th>Qtde Bipada</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-separacao-itens">
                            <!-- itens -->
                        </tbody>
                    </table>
                </div>

                <div style="display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid var(--border-color); margin-top: 15px;">
                    <button class="action-button" onclick="Modulo_separacao.limparSelecao()">Cancelar / Fechar</button>
                    <div style="display: flex; gap: 10px;">
                        <button id="btn-iniciar-separacao" class="btn btn-primary" onclick="Modulo_separacao.iniciarSeparacao()">Iniciar Separação</button>
                        <button id="btn-concluir-separacao" class="btn btn-success" style="display: none;" onclick="Modulo_separacao.concluirSeparacao()">Concluir e Conferir</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
