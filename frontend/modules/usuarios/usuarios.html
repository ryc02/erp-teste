<script src="../../core/module-shell-redirect.js" data-module-id="usuarios"></script>
<!-- VIEW: USUÁRIOS (ADMIN ONLY) -->
<section id="view-usuarios" class="view-section">
    <div class="flex-between">
        <h2>Gerenciamento de Usuários</h2>
        <button class="btn btn-primary" onclick="Modulo_usuarios.prepareNewUser()">
            <i class="ph ph-user-plus"></i> Novo Usuário
        </button>
    </div>
    <div class="card">
        <div class="table-scroll">
            <table class="olist-table" id="table-usuarios">
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Nome Completo</th>
                        <th>E-mail</th>
                        <th>Função</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</section>

<!-- MODAL: NOVO USUÁRIO -->
<div id="modal-usuario" class="modal">
    <div class="modal-content card">
        <h3 id="user-modal-title">Cadastrar Usuário</h3>
        <form id="form-usuario" onsubmit="Modulo_usuarios.saveUser(event)">
            <input type="hidden" id="user-id">
            <div class="grid-2">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="user-username" name="username" required>
                </div>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="user-email" name="email" required>
                </div>
            </div>
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="user-nome" name="nome_completo" required>
            </div>
            <div class="grid-2">
                <div class="input-group">
                    <label>Função (Role)</label>
                    <select name="role_id" id="user-role-sel" required></select>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="user-password" name="password" placeholder="Digite a senha">
                </div>
            </div>
            <div class="input-group">
                <label class="checkbox-row">
                    <input type="checkbox" id="user-ativo" checked>
                    Usuário ativo
                </label>
            </div>

            <div class="separator-text">Permissões de Acesso (Módulos)</div>
            <div class="permissions-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; padding: 15px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px;">
                <label class="checkbox-row"><input type="checkbox" name="perm-module" value="dashboard"> 📊 Dashboard</label>
                <label class="checkbox-row"><input type="checkbox" name="perm-module" value="vendas"> 🛒 Catálogo Vendas</label>
                <label class="checkbox-row"><input type="checkbox" name="perm-module" value="clientes"> 👤 Gestão Clientes</label>
                <label class="checkbox-row"><input type="checkbox" name="perm-module" value="produtos"> 📦 Controle Estoque</label>
                <label class="checkbox-row"><input type="checkbox" name="perm-module" value="reservas"> 🎯 Reservas</label>
                <label class="checkbox-row"><input type="checkbox" name="perm-module" value="inventario"> 📝 Inventário</label>
                <label class="checkbox-row"><input type="checkbox" name="perm-module" value="relatorios"> 📈 Relatórios</label>
                <label class="checkbox-row"><input type="checkbox" name="perm-module" value="gestao_fabrica"> 🏭 Gestão Fábrica</label>
                <label class="checkbox-row"><input type="checkbox" name="perm-module" value="pcp"> ⚙️ Produção (PCP)</label>
                <label class="checkbox-row"><input type="checkbox" name="perm-module" value="produtividade"> ⏱️ Produtividade</label>
                <label class="checkbox-row"><input type="checkbox" name="perm-module" value="manutencao"> 🔧 Manutenção</label>
                <label class="checkbox-row"><input type="checkbox" name="perm-module" value="auditoria"> 🔍 Auditoria (Adm)</label>
                <label class="checkbox-row"><input type="checkbox" name="perm-module" value="usuarios"> 👥 Usuários (Adm)</label>
                <label class="checkbox-row"><input type="checkbox" name="perm-module" value="configuracoes"> 🛠️ Configurações (Adm)</label>
            </div>
            <div class="modal-actions">
                <button type="button" class="action-button" onclick="closeModal('modal-usuario')">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar Usuário</button>
            </div>
        </form>
    </div>
</div>
