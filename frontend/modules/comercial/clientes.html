<script src="../../core/module-shell-redirect.js" data-module-id="clientes" data-shell="comercial"></script>
<section id="view-clientes" class="view-section">
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px;">
        <div>
            <div style="font-size: 12px; color: #888; margin-bottom: 8px;">
                módulo <span >gestão</span>
            </div>
            <h2 style="margin: 0; font-size: 24px; font-weight: 600; ">Gestão de Clientes</h2>
        </div>
        <div class="flex-gap">
            <button class="btn btn-primary" onclick="Modulo_clientes.openModalNovo()">
                <i class="ph ph-plus"></i> Novo Cliente
            </button>
            <button class="action-button" onclick="Modulo_clientes.refresh()">
                <i class="ph ph-arrows-clockwise"></i> Atualizar
            </button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total de Clientes</div>
            <div class="stat-value" id="stat-clientes-total">0</div>
        </div>
        <div class="stat-card success">
            <div class="stat-label">Clientes Ativos</div>
            <div class="stat-value" id="stat-clientes-ativos">0</div>
        </div>
        <div class="stat-card info">
            <div class="stat-label">Novos (Este Mês)</div>
            <div class="stat-value" id="stat-clientes-novos">0</div>
        </div>
    </div>

    <div class="card">
        <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; align-items: center;">
            <div style="flex: 1; max-width: 400px; position: relative;">
                <i class="ph ph-magnifying-glass" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
                <input id="clientes-search" type="text" placeholder="Buscar por nome, CPF/CNPJ ou cidade..." style="padding-left: 35px;">
            </div>
            <div class="flex-gap">
                <select id="clientes-filter-situacao" style="width: 150px;" onchange="Modulo_clientes.refresh()">
                    <option value="">Todas Situações</option>
                    <option value="ATIVO">Ativos</option>
                    <option value="INATIVO">Inativos</option>
                </select>
                <select id="clientes-filter-tipo" style="width: 150px;" onchange="Modulo_clientes.refresh()">
                    <option value="">Todos Tipos</option>
                    <option value="JURIDICA">Pessoa Jurídica</option>
                    <option value="FISICA">Pessoa Física</option>
                </select>
            </div>
        </div>
        <div class="table-scroll">
            <table class="olist-table" id="table-clientes">
                <thead>
                    <tr>
                        <th>Nome / Razão Social</th>
                        <th>CPF / CNPJ</th>
                        <th>Cidade / UF</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5" style="text-align:center">Carregando clientes...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<!-- MODAL: CADASTRO DE CLIENTE -->
<div id="modal-cliente" class="modal">
    <div class="modal-content card" style="max-width: 900px;">
        <div class="view-header" style="margin-bottom: 20px; border: none; padding: 0;">
            <h3 id="modal-cliente-title">Cadastro de Cliente</h3>
        </div>

        <div class="tabs-container">
            <button class="olist-tab active tab-btn" style="background:transparent; border-top:none; border-left:none; border-right:none;" onclick="Modulo_clientes.switchTab('tab-cliente-dados')">Dados Gerais</button>
            <button class="olist-tab tab-btn" style="background:transparent; border-top:none; border-left:none; border-right:none;" onclick="Modulo_clientes.switchTab('tab-cliente-endereco')">Endereço</button>
            <button class="olist-tab tab-btn" style="background:transparent; border-top:none; border-left:none; border-right:none;" onclick="Modulo_clientes.switchTab('tab-cliente-comercial')">Comercial / Financeiro</button>
        </div>

        <form id="form-cliente" onsubmit="Modulo_clientes.save(event)">
            <input type="hidden" id="cliente-id">
            
            <!-- ABA: DADOS GERAIS -->
            <div id="tab-cliente-dados" class="tab-content active">
                <div class="grid-2">
                    <div class="input-group">
                        <label>Tipo de Pessoa</label>
                        <select id="cliente-tipo-pessoa" onchange="Modulo_clientes.toggleDocumentLabels()">
                            <option value="JURIDICA">Pessoa Jurídica</option>
                            <option value="FISICA">Pessoa Física</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Situação</label>
                        <select id="cliente-situacao">
                            <option value="ATIVO">Ativo</option>
                            <option value="INATIVO">Inativo</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label id="lbl-cliente-nome">Razão Social</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="cliente-nome" required style="flex: 1;">
                        <button type="button" class="action-button" id="btn-lookup-documento" onclick="Modulo_clientes.lookupDocumento()" title="Consultar CNPJ/CPF">
                            <i class="ph ph-magnifying-glass"></i>
                        </button>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label id="lbl-cliente-documento">CNPJ</label>
                        <input type="text" id="cliente-documento" placeholder="00.000.000/0000-00">
                    </div>
                    <div class="input-group">
                        <label id="lbl-cliente-rg">Inscrição Estadual</label>
                        <input type="text" id="cliente-rg-ie">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="cliente-email">
                    </div>
                    <div class="input-group">
                        <label>WhatsApp / Telefone</label>
                        <input type="text" id="cliente-whatsapp">
                    </div>
                </div>
            </div>

            <!-- ABA: ENDEREÇO -->
            <div id="tab-cliente-endereco" class="tab-content">
                <div style="display: grid; grid-template-columns: 150px 1fr 100px; gap: 12px;">
                    <div class="input-group">
                        <label>CEP</label>
                        <div style="display: flex; gap: 4px;">
                            <input type="text" id="cliente-cep" maxlength="9">
                            <button type="button" class="btn btn-outline btn-sm" onclick="Modulo_clientes.lookupCEP()">
                                <i class="ph ph-magnifying-glass"></i>
                            </button>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Logradouro</label>
                        <input type="text" id="cliente-endereco">
                    </div>
                    <div class="input-group">
                        <label>Nº</label>
                        <input type="text" id="cliente-numero">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="input-group">
                        <label>Bairro</label>
                        <input type="text" id="cliente-bairro">
                    </div>
                    <div class="input-group">
                        <label>Complemento</label>
                        <input type="text" id="cliente-complemento">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 80px; gap: 12px;">
                    <div class="input-group">
                        <label>Cidade</label>
                        <input type="text" id="cliente-cidade">
                    </div>
                    <div class="input-group">
                        <label>UF</label>
                        <input type="text" id="cliente-uf" maxlength="2">
                    </div>
                </div>
            </div>

            <!-- ABA: COMERCIAL -->
            <div id="tab-cliente-comercial" class="tab-content">
                <div class="grid-2">
                    <div class="input-group">
                        <label>Representante</label>
                        <select id="cliente-representante">
                            <option value="">Venda Direta</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Vendedor Interno</label>
                        <input type="text" id="cliente-vendedor-interno">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="input-group">
                        <label>Forma de Pagamento Padrão</label>
                        <select id="cliente-forma-pgto"></select>
                    </div>
                    <div class="input-group">
                        <label>Condição de Pagamento</label>
                        <select id="cliente-condicao-pgto">
                            <option value="A_VISTA">À Vista</option>
                            <option value="A_PRAZO">À Prazo</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Observações Internas</label>
                    <textarea id="cliente-obs" rows="3"></textarea>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="action-button" onclick="closeModal('modal-cliente')">Cancelar</button>
                <button type="submit" class="btn btn-primary">
                    <i class="ph ph-check"></i> Salvar Cliente
                </button>
            </div>
        </form>
    </div>
</div>
